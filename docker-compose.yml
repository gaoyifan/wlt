services:
  wlt:
    build:
      context: .
    image: ghcr.io/gaoyifan/wlt:latest
    container_name: wlt
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./config.d:/app/config.d:ro
      - /etc/ssl/private/yfgao:/etc/ssl/private/yfgao:ro
      - /etc/nftables:/etc/nftables
      - wlt-ssh-data:/data
    network_mode: host
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
volumes:
  wlt-ssh-data:
