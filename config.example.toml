time_limits = [1, 4, 8, 24, 0] # 1小时, 4小时, 8小时, 24小时, 永久

# Services are enabled by the presence of their section: [web], [ssh], [persist].

[web]
# One listener is bound per address; "[::]:80" is dual-stack (accepts IPv4 too).
listen = ["[::]:80"]
# Optional TLS listeners (serve the same routes):
# [web.https]
# listen = ["[::]:443"]
# cert = "/etc/ssl/private/example/fullchain.pem"
# key = "/etc/ssl/private/example/privkey.pem"

# No-auth SSH TUI. The host key is generated on first start if missing.
[ssh]
listen = ["[::]:2222"]
host_key = "/data/ssh_host_key"

# Periodically snapshot the src2mark maps to a reloadable nftables include
# file (only written when the content changes; atomic replace + fsync).
[persist]
path = "/etc/nftables/wlt_src2mark.conf"
interval = 300          # seconds

[nftables]
family = "inet"
table = "wlt"
map = "src2mark"        # IPv4 client src -> mark
map_v6 = "src2mark6"    # IPv6 client src -> mark (omit to disable IPv6 selection)

# Optional: split-horizon hostnames for the dual-stack single-page UI. Each must
# resolve to a single address family so the browser reveals the client's address
# for that family; the SPA fetches both /api/status concurrently.
[portal]
v4_host = "wlt-ipv4.example.net"
v6_host = "wlt-ipv6.example.net"
# Allow cross-origin API calls from this domain and its subdomains (needed by
# the split-horizon SPA; omit to disable CORS entirely).
cors_domain = "example.net"

# Each group serves both families: IPv4 clients use `outlets`, IPv6 clients use
# `outlets_v6` (omit outlets_v6 to keep a group IPv4-only).
#
# Set `cn_last = true` on a group to push CN-country outlets (names starting with
# "CN ") to the bottom of the displayed list. This only reorders the UI/TUI; mark
# values and lookups are unaffected. Handy for an overseas group that also lists
# the domestic exits for completeness.
[[outlet_groups]]
title = "选择出口"
mask = 0xFF
[outlet_groups.outlets]
"电信出口" = 0x1
"移动出口" = 0x2
"联通出口" = 0x3
"教育网出口" = 0x4
"CN2出口" = 0x5
[outlet_groups.outlets_v6]
"教育网出口" = 0x4

[[outlet_groups]]
title = "路由策略"
mask = 0xF00
[outlet_groups.outlets]
"默认" = 0x0
"覆盖CN路由" = 0x100
[outlet_groups.outlets_v6]
"默认" = 0x0
"覆盖CN路由" = 0x100
